<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #333; color: #fff; padding: 10px 0; text-align: center; }
        nav { margin: 10px; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; }
        .search-container { margin: 10px; text-align: center; }
        .search-container input[type="text"] { padding: 5px; width: 200px; }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <div class="search-container">
        <input type="text" placeholder="Search...">
        <button><i class="fas fa-search"></i> Search</button>
    </div>
    <footer>
        <p>Copyright &copy; 2026 My Website</p>
    </footer>
</body>
</html>
